<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swoosh | URL Shortener</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    
    <div class="container">
        <header>
            <div class="header-row">
                <h1>Swoosh</h1>
                <button id="logout-btn" class="logout-btn hidden" title="Logout">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
            <p>Make your links magically short</p>
        </header>

        <main>
            <div class="glass-card" id="password-card">
                <div class="lock-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        <circle cx="12" cy="16" r="1"/>
                    </svg>
                </div>
                <h2 class="login-title">Welcome Back</h2>
                <p class="login-subtitle">Enter your password to continue</p>
                <div class="input-group">
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
                        <button type="button" id="toggle-password" class="eye-btn" title="Show password">
                            <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-closed hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="button" id="password-btn" class="login-btn">
                    <span>Unlock</span>
                </button>
                <div id="password-error" class="error hidden"></div>
            </div>

            <div class="glass-card hidden" id="app-card">
                <form id="shorten-form">
                    <div class="input-group">
                        <label for="url">Original URL</label>
                        <input type="url" id="url" placeholder="https://example.com/very/long/path" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="custom_code">Custom Code (Optional)</label>
                        <div class="input-prefix-wrapper">
                            <span class="prefix">swoo.sh/</span>
                            <input type="text" id="custom_code" placeholder="my-event">
                        </div>
                    </div>

                    <button type="submit" id="submit-btn">
                        <span>Shorten URL</span>
                        <div class="loader" id="btn-loader"></div>
                    </button>
                </form>

                <div id="error-message" class="error hidden"></div>

                <div id="result-section" class="result hidden">
                    <div class="success-icon">✨</div>
                    <p>Your short link is ready!</p>
                    <div class="short-link-box">
                        <a href="#" id="short-link-url" target="_blank"></a>
                        <button id="copy-btn" title="Copy to clipboard">📋</button>
                    </div>
                    <button id="new-link-btn" class="secondary-btn">Shorten Another</button>
                </div>

            </div> <!-- end app-card -->

            <div class="glass-card my-links-card hidden" id="my-links-card">
                <div class="my-links-header">
                    <h3>My Links</h3>
                    <button id="refresh-links-btn" class="icon-btn" title="Refresh">🔄</button>
                </div>
                <div id="links-list" class="links-list">
                    <p class="text-muted">Loading...</p>
                </div>
            </div>
        </main>
        
        <footer>
            <p>Built with FastAPI & Claude Code</p>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
