<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta tags for sharing -->
    <title>SHORT. | Luxury Link Management</title>
    <meta name="description" content="Premium URL shortening service. Shorten your links with elegance.">
    <meta name="theme-color" content="#1C1917">
    <!-- Favicon (SVG for high res) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
    
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    
    <div class="container">
        <header>
            <div class="header-row">
                <!-- Typographic Logo -->
                <div class="brand-logo">SHORT<span>.</span></div>
                <button id="logout-btn" class="logout-btn hidden" title="Logout">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
            <p>Elevate your links to premium status</p>
        </header>

        <main>
            <!-- Password Card -->
            <div class="glass-card" id="password-card">
                <div class="lock-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        <circle cx="12" cy="16" r="1"/>
                    </svg>
                </div>
                <h2 class="login-title" style="text-align: center; margin-bottom: 0.5rem;">Exclusive Access</h2>
                <p class="login-subtitle" style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Please authenticate to continue</p>
                <div class="input-group">
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Passcode" autocomplete="current-password">
                        <button type="button" id="toggle-password" class="eye-btn" title="Show password">
                            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-closed hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="button" id="password-btn" class="login-btn">
                    <span>Enter Vault</span>
                </button>
                <div id="password-error" class="error hidden"></div>
            </div>

            <!-- App Card -->
            <div class="glass-card hidden" id="app-card">
                <form id="shorten-form">
                    <div class="input-group">
                        <label for="url">Original URL</label>
                        <input type="url" id="url" placeholder="https://example.com/very/long/path" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="custom_code">Custom Vanity Code (Optional)</label>
                        <div class="input-prefix-wrapper">
                            <span class="prefix">swoo.sh/</span>
                            <input type="text" id="custom_code" placeholder="vip-event">
                        </div>
                    </div>

                    <button type="submit" id="submit-btn">
                        <span>Shorten Link</span>
                    </button>

                    <!-- Loading State for Render Cold Start -->
                    <div id="loading-container" class="loading-container">
                        <div class="spinner"></div>
                        <div id="loading-text" class="loading-text">Waking up the servers...</div>
                    </div>
                </form>

                <div id="error-message" class="error hidden"></div>

                <div id="result-section" class="result hidden">
                    <div class="success-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                    </div>
                    <p style="font-weight: 500; font-size: 1.1rem;">Your premium link is ready.</p>
                    <div class="short-link-box">
                        <a href="#" id="short-link-url" target="_blank"></a>
                        <button id="copy-btn" title="Copy to clipboard">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                    </div>
                    <button id="new-link-btn" class="secondary-btn">Create Another</button>
                </div>

            </div> <!-- end app-card -->

            <!-- Links Card -->
            <div class="glass-card my-links-card hidden" id="my-links-card">
                <div class="my-links-header">
                    <h3>Portfolio</h3>
                    <button id="refresh-links-btn" class="icon-btn" title="Refresh">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                    </button>
                </div>
                <div id="links-list" class="links-list">
                    <p class="text-muted" style="text-align: center; padding: 2rem 0;">Loading portfolio...</p>
                </div>
            </div>
        </main>
        
        <footer>
            <p>Crafted with elegance for Vibe Coding</p>
        </footer>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container"></div>

    <script src="/static/script.js?v=3"></script>
</body>
</html>
