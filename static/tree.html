<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Tree | SWOOSH</title>
    <meta name="description" content="Discover my links on SWOOSH.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.5);
            --accent: #6366f1;
            --accent-hover: #4f46e5;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #e0e7ff 0%, #fefce8 100%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .background-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #818cf8;
            top: -100px;
            left: -100px;
            animation: float 10s ease-in-out infinite alternate;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #fde047;
            bottom: 10%;
            right: -50px;
            animation: float 8s ease-in-out infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 3rem 1.5rem;
            box-sizing: border-box;
            text-align: center;
        }

        .profile-header {
            margin-bottom: 2.5rem;
            animation: slideUp 0.6s ease-out;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            margin: 0 auto 1.5rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
            border: 4px solid white;
        }

        .username {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.02em;
        }

        .bio {
            font-size: 1rem;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.5;
            max-width: 400px;
            margin: 0 auto;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-card {
            display: flex;
            align-items: center;
            padding: 1.25rem 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            animation: slideUp 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .link-card:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .link-icon {
            font-size: 1.5rem;
            margin-right: 1.25rem;
            width: 32px;
            text-align: center;
        }

        .link-title {
            flex-grow: 1;
            font-weight: 600;
            font-size: 1.05rem;
            text-align: left;
        }

        .link-arrow {
            color: var(--text-muted);
            opacity: 0.5;
            transition: opacity 0.2s, transform 0.2s;
        }

        .link-card:hover .link-arrow {
            opacity: 1;
            transform: translateX(4px);
        }

        /* Platform specific colors */
        .platform-twitter .link-icon { color: #1DA1F2; }
        .platform-instagram .link-icon { color: #E1306C; }
        .platform-linkedin .link-icon { color: #0077B5; }
        .platform-github .link-icon { color: #333; }
        .platform-facebook .link-icon { color: #1877F2; }
        .platform-youtube .link-icon { color: #FF0000; }
        .platform-tiktok .link-icon { color: #000000; }
        .platform-website .link-icon { color: var(--accent); }
        .platform-other .link-icon { color: var(--text-muted); }

        footer {
            margin-top: auto;
            padding: 2rem 0;
            text-align: center;
        }

        .swoosh-branding {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .swoosh-branding:hover {
            color: var(--accent);
        }

        .swoosh-branding img {
            height: 20px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .swoosh-branding:hover img {
            opacity: 1;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Error state */
        .error-state {
            text-align: center;
            padding: 3rem;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
            margin: 3rem auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="container" id="app">
        <div class="loading-spinner" id="loader"></div>
    </div>

    <footer>
        <a href="/" class="swoosh-branding">
            <span>Powered by</span>
            <img src="/static/logo.png" alt="SWOOSH">
        </a>
    </footer>

    <script>
        const getIconClass = (platform) => {
            const map = {
                'twitter': 'fa-brands fa-twitter',
                'instagram': 'fa-brands fa-instagram',
                'linkedin': 'fa-brands fa-linkedin',
                'github': 'fa-brands fa-github',
                'facebook': 'fa-brands fa-facebook',
                'youtube': 'fa-brands fa-youtube',
                'tiktok': 'fa-brands fa-tiktok',
                'website': 'fa-solid fa-globe',
                'other': 'fa-solid fa-link'
            };
            return map[platform] || map['other'];
        };

        const escapeHtml = (unsafe) => {
            if (!unsafe) return '';
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        };

        const getDisplayTitle = (link) => {
            if (link.title) return escapeHtml(link.title);
            if (link.platform && link.platform !== 'website' && link.platform !== 'other') {
                return link.platform.charAt(0).toUpperCase() + link.platform.slice(1);
            }
            return escapeHtml(link.url.replace(/^https?:\/\//, '').replace(/\/$/, ''));
        };

        async function init() {
            const pathParts = window.location.pathname.split('/');
            const username = pathParts[pathParts.length - 1];

            if (!username) {
                showError("Profile not found");
                return;
            }

            try {
                const res = await fetch(`/api/users/${username}/tree`);
                if (!res.ok) {
                    if (res.status === 404) throw new Error("Profile not found");
                    throw new Error("Failed to load profile");
                }

                const data = await res.json();
                renderProfile(data);
            } catch (err) {
                showError(err.message);
            }
        }

        function renderProfile(data) {
            const app = document.getElementById('app');
            const initial = data.username.charAt(0).toUpperCase();
            const avatarHtml = data.avatar_url
                ? `<img src="${escapeHtml(data.avatar_url)}" alt="Avatar" style="width: 100%; height: 100%; object-fit: cover;">`
                : initial;

            let html = `
                <div class="profile-header">
                    <div class="avatar">${avatarHtml}</div>
                    <h1 class="username">@${escapeHtml(data.username)}</h1>
                    ${data.bio ? `<p class="bio">${escapeHtml(data.bio)}</p>` : ''}
                </div>
                <div class="links-container">
            `;

            let hasLinks = false;

            if (data.social_links && data.social_links.length > 0) {
                hasLinks = true;
                data.social_links.forEach((link, index) => {
                    const delay = index * 0.1;
                    const displayTitle = getDisplayTitle(link);
                    const iconClass = getIconClass(link.platform);
                    const platformClass = `platform-${escapeHtml(link.platform || 'other')}`;

                    // Add protocol if missing
                    let href = link.url;
                    if (!href.startsWith('http://') && !href.startsWith('https://')) {
                        href = 'https://' + href;
                    }

                    html += `
                        <a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer" class="link-card ${platformClass}" style="animation-delay: ${delay}s">
                            <i class="${iconClass} link-icon"></i>
                            <span class="link-title">${displayTitle}</span>
                            <i class="fa-solid fa-chevron-right link-arrow"></i>
                        </a>
                    `;
                });
            }

            if (data.tree_links && data.tree_links.length > 0) {
                hasLinks = true;
                data.tree_links.forEach((link, index) => {
                    const delay = ((data.social_links || []).length + index) * 0.1;
                    const displayTitle = escapeHtml(link.title || link.short_code);
                    const href = `${window.location.origin}/${link.short_code}`;
                    html += `
                        <a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer" class="link-card platform-website" style="animation-delay: ${delay}s">
                            <i class="fa-solid fa-link link-icon"></i>
                            <span class="link-title">${displayTitle}</span>
                            <i class="fa-solid fa-chevron-right link-arrow"></i>
                        </a>
                    `;
                });
            }

            if (!hasLinks) {
                html += `
                    <div style="text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.95rem;">
                        <i class="fa-solid fa-seedling" style="font-size: 2rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                        <p>No links added yet.</p>
                    </div>
                `;
            }

            html += `</div>`;
            app.innerHTML = html;

            // Update page title
            document.title = `${data.username} | SWOOSH`;
        }

        function showError(msg) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="error-state">
                    <i class="fa-solid fa-circle-exclamation" style="font-size: 3rem; color: #EF4444; margin-bottom: 1rem;"></i>
                    <h2 style="margin: 0 0 0.5rem 0; font-size: 1.5rem;">Oops!</h2>
                    <p style="color: var(--text-muted); margin: 0;">${escapeHtml(msg)}</p>
                    <a href="/" style="display: inline-block; margin-top: 1.5rem; color: var(--accent); text-decoration: none; font-weight: 500;">
                        Go to Homepage &rarr;
                    </a>
                </div>
            `;
        }

        // Run
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
