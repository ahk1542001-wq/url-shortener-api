<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Tree | SWOOSH</title>
    <meta name="description" content="Discover my links on SWOOSH.">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@600;700&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FAFCF5;
            --text-color: #2F3A1D;
            --text-muted: #66705A;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.5);
            --card-hover-bg: rgba(255, 255, 255, 0.92);
            --accent: #CFFF74;
            --accent-hover: #B8E95F;
        }

        body {
            font-family: 'Jost', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #FAFCF5 0%, #EAF3D7 100%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #11170B;
                --text-color: #F7FAEF;
                --text-muted: #BEC8AD;
                --card-bg: rgba(47, 58, 29, 0.76);
                --card-border: rgba(207, 255, 116, 0.22);
                --card-hover-bg: rgba(68, 85, 42, 0.92);
            }

            body {
                background: linear-gradient(135deg, #11170B 0%, #2F3A1D 100%);
            }

        }

        .background-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(207, 255, 116, 0.7);
            top: -100px;
            left: -100px;
            animation: float 10s ease-in-out infinite alternate;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: rgba(88, 107, 53, 0.35);
            bottom: 10%;
            right: -50px;
            animation: float 8s ease-in-out infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 3rem 1.5rem;
            box-sizing: border-box;
            text-align: center;
        }

        .profile-header {
            margin-bottom: 2.5rem;
            animation: slideUp 0.6s ease-out;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #9BBE55);
            margin: 0 auto 1.5rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #2F3A1D;
            box-shadow: 0 10px 25px -5px rgba(47, 58, 29, 0.28);
            border: 4px solid white;
        }

        .username {
            font-family: 'Bodoni Moda', serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.02em;
        }

        .bio {
            font-size: 1rem;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.5;
            max-width: 400px;
            margin: 0 auto;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 58px;
            padding: 0.85rem 3.25rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            animation: slideUp 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .link-card:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            background: var(--card-hover-bg);
            border-color: var(--accent-hover);
        }

        .link-icon {
            position: absolute;
            left: 1rem;
            width: 20px;
            height: 20px;
            display: inline-block;
            vertical-align: middle;
        }

        .link-title {
            width: 100%;
            font-weight: 600;
            font-size: 1rem;
            text-align: center;
            overflow-wrap: anywhere;
        }

        .link-arrow {
            position: absolute;
            right: 1rem;
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            opacity: 0.5;
            transition: opacity 0.2s, transform 0.2s;
        }

        .link-card:hover .link-arrow {
            opacity: 1;
            transform: translateX(4px);
        }

        /* Platform specific colors */
        .platform-twitter .link-icon { color: #1DA1F2; }
        .platform-instagram .link-icon { color: #E1306C; }
        .platform-linkedin .link-icon { color: #0077B5; }
        .platform-github .link-icon { color: #333; }
        .platform-facebook .link-icon { color: #1877F2; }
        .platform-youtube .link-icon { color: #FF0000; }
        .platform-tiktok .link-icon { color: #000000; }
        .platform-website .link-icon { color: var(--accent); }
        .platform-other .link-icon { color: var(--text-muted); }

        footer {
            margin-top: auto;
            padding: 2rem 0;
            text-align: center;
        }

        .swoosh-branding {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .swoosh-branding:hover {
            color: var(--accent);
        }

        .swoosh-branding img {
            width: auto;
            height: 24px;
            filter: brightness(0) invert(1);
            opacity: 0.9;
            transition: opacity 0.2s;
        }

        .swoosh-branding:hover img {
            opacity: 1;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Error state */
        .error-state {
            text-align: center;
            padding: 3rem;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
            margin: 3rem auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="container" id="app">
        <div class="loading-spinner" id="loader"></div>
    </div>

    <footer>
        <a href="/" class="swoosh-branding">
            <span>Powered by</span>
            <img src="/static/logo.png" alt="SWOOSH">
        </a>
    </footer>

    <script>
        const getIconSVG = (platform) => {
            const svgMap = {
                'twitter': `<svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"></path></svg>`,
                'instagram': `<svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>`,
                'linkedin': `<svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>`,
                'github': `<svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>`,
                'facebook': `<svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>`,
                'youtube': `<svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z"></path><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon></svg>`,
                'tiktok': `<svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path></svg>`,
                'website': `<svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>`,
                'other': `<svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>`
            };
            return svgMap[platform] || svgMap['other'];
        };

        const arrowSVG = `<svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`;

        const escapeHtml = (unsafe) => {
            if (!unsafe) return '';
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        };

        const getDisplayTitle = (link) => {
            if (link.title) return escapeHtml(link.title);
            if (link.platform && link.platform !== 'website' && link.platform !== 'other') {
                return link.platform.charAt(0).toUpperCase() + link.platform.slice(1);
            }
            return escapeHtml(link.url.replace(/^https?:\/\//, '').replace(/\/$/, ''));
        };

        async function init() {
            const pathParts = window.location.pathname.split('/');
            const username = pathParts[pathParts.length - 1];

            if (!username) {
                showError("Profile not found");
                return;
            }

            try {
                const res = await fetch(`/api/users/${username}/tree`);
                if (!res.ok) {
                    if (res.status === 404) throw new Error("Profile not found");
                    throw new Error("Failed to load profile");
                }

                const data = await res.json();
                renderProfile(data);
            } catch (err) {
                showError(err.message);
            }
        }

        function renderProfile(data) {
            const app = document.getElementById('app');
            const initial = data.username.charAt(0).toUpperCase();
            const avatarHtml = data.avatar_url
                ? `<img src="${escapeHtml(data.avatar_url)}" alt="Avatar" style="width: 100%; height: 100%; object-fit: cover;">`
                : initial;

            let html = `
                <div class="profile-header">
                    <div class="avatar">${avatarHtml}</div>
                    <h1 class="username">@${escapeHtml(data.username)}</h1>
                    ${data.bio ? `<p class="bio">${escapeHtml(data.bio)}</p>` : ''}
                </div>
                <div class="links-container">
            `;

            let hasLinks = false;

            if (data.social_links && data.social_links.length > 0) {
                hasLinks = true;
                data.social_links.forEach((link, index) => {
                    const delay = index * 0.1;
                    const displayTitle = getDisplayTitle(link);
                    const iconSVG = getIconSVG(link.platform);
                    const platformClass = `platform-${escapeHtml(link.platform || 'other')}`;

                    // Add protocol if missing
                    let href = link.url;
                    if (!href.startsWith('http://') && !href.startsWith('https://')) {
                        href = 'https://' + href;
                    }

                    html += `
                        <a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer" class="link-card ${platformClass}" style="animation-delay: ${delay}s">
                            ${iconSVG}
                            <span class="link-title">${displayTitle}</span>
                            ${arrowSVG}
                        </a>
                    `;
                });
            }

            if (data.tree_links && data.tree_links.length > 0) {
                hasLinks = true;
                data.tree_links.forEach((link, index) => {
                    const delay = ((data.social_links || []).length + index) * 0.1;
                    const displayTitle = escapeHtml(link.title || link.short_code);
                    const href = `${window.location.origin}/${link.short_code}`;
                    html += `
                        <a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer" class="link-card platform-website" style="animation-delay: ${delay}s">
                            ${getIconSVG('website')}
                            <span class="link-title">${displayTitle}</span>
                            ${arrowSVG}
                        </a>
                    `;
                });
            }

            if (!hasLinks) {
                html += `
                    <div style="text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.95rem;">
                        <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem; opacity: 0.5;"><path d="M2 22h20"></path><path d="M12 22V10"></path><path d="M12 14c2.67-2.67 6-3 6-3s-.33 3.33-3 6"></path><path d="M12 10c-2.67-2.67-6-3-6-3s.33 3.33 3 6"></path></svg>
                        <p>No links added yet.</p>
                    </div>
                `;
            }

            html += `</div>`;
            app.innerHTML = html;

            // Update page title
            document.title = `${data.username} | SWOOSH`;
        }

        function showError(msg) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="error-state">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    <h2 style="margin: 0 0 0.5rem 0; font-size: 1.5rem;">Oops!</h2>
                    <p style="color: var(--text-muted); margin: 0;">${escapeHtml(msg)}</p>
                    <a href="/" style="display: inline-block; margin-top: 1.5rem; color: var(--accent); text-decoration: none; font-weight: 500;">
                        Go to Homepage &rarr;
                    </a>
                </div>
            `;
        }

        // Run
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
